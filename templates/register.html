<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - GeoGestao Topografia</title>
    <link rel="icon" type="image/png" sizes="64x64" href="{{ url_for('static', filename='favicon-64.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="login-page">
<main class="login-card">
    <div class="login-brand">
        <span class="brand-mark">GG</span>
        <div>
            <h1>Solicitar acesso</h1>
            <p>Seu cadastro ficara pendente ate aprovacao de um administrador.</p>
        </div>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}" role="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <form method="post" class="vstack gap-3">
        <div>
            <label class="form-label">Nome completo</label>
            <input class="form-control" name="nome" autocomplete="name" required />
        </div>
        <div>
            <label class="form-label">E-mail</label>
            <input class="form-control" type="email" name="email" autocomplete="email" required />
        </div>
        <div>
            <label class="form-label">Senha</label>
            <input class="form-control" type="password" name="senha" autocomplete="new-password" minlength="6" required />
        </div>
        <div>
            <label class="form-label">Confirmar senha</label>
            <input class="form-control" type="password" name="senha_confirmacao" autocomplete="new-password" minlength="6" required />
        </div>
        <button class="btn btn-primary w-100" type="submit">Enviar cadastro</button>
    </form>
    <div class="auth-link">
        <a href="{{ url_for('login') }}">Voltar para o login</a>
    </div>
</main>
</body>
</html>
