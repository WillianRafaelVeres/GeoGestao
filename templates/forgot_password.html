<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar senha - GeoGestao Topografia</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='geogestao-logo.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='geogestao-logo.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="login-page">
<main class="login-card">
    <div class="login-brand">
        <span class="brand-mark">GG</span>
        <div>
            <h1>Recuperar senha</h1>
            <p>Informe seu e-mail para receber um link de redefinicao.</p>
        </div>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}" role="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <form method="post" class="vstack gap-3">
        <div>
            <label class="form-label">E-mail</label>
            <input class="form-control" type="email" name="email" autocomplete="username" required autofocus />
        </div>
        <button class="btn btn-primary w-100" type="submit">Enviar recuperacao</button>
    </form>
    <div class="auth-link">
        <a href="{{ url_for('login') }}">Voltar para o login</a>
    </div>
</main>
</body>
</html>
