services:
  - type: web
    name: geogestao
    runtime: python
    plan: free
    buildCommand: python -m pip install -r requirements.txt
    # Nota: o banco fica em sa-east-1 (Sao Paulo). Se este servico for recriado,
    # escolha a regiao Render mais proxima (virginia) para reduzir a latencia por query.
    startCommand: gunicorn app:app --workers 1 --threads 8 --timeout 120
    envVars:
      - key: GEOGESTAO_DEBUG
        value: "0"
      - key: GEOGESTAO_AUTO_INIT_DB
        value: "0"
      - key: GEOGESTAO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      # Integracao Dropbox (abrir pasta do projeto). Valores no dashboard do Render.
      - key: DROPBOX_APP_KEY
        sync: false
      - key: DROPBOX_APP_SECRET
        sync: false
      - key: DROPBOX_REFRESH_TOKEN
        sync: false
